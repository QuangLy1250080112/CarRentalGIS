{% extends 'rental/base.html' %}

{% block content %}
<article class="row justify-content-center">
  <div class="col-lg-10">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none">Trang chủ</a></li>
        <li class="breadcrumb-item active" aria-current="page">Tin tức</li>
      </ol>
    </nav>

    <div class="card border-0 shadow-sm">
      <img src="{{ article.thumbnail.url }}" class="card-img-top" alt="{{ article.title }}" style="max-height: 480px; object-fit: cover;">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h2 fw-bold mb-3">{{ article.title }}</h1>
        <p class="text-muted mb-4">Đăng ngày {{ article.created_at|date:"d/m/Y H:i" }}</p>
        {% if request.session.user_id and request.session.role == 'admin' %}
        <div class="mb-4">
          <form method="post" action="{% url 'delete_news' article.id %}" onsubmit="return confirm('Bạn có chắc muốn xóa bài báo này không?');">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">
              <i class="fas fa-trash-alt"></i> Xóa bài viết
            </button>
          </form>
        </div>
        {% endif %}
        <div class="news-content">
          {{ article.content|safe }}
        </div>
      </div>
    </div>
  </div>
</article>
{% endblock %}
