{% extends 'rental/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4>Quên mật khẩu</h4>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-info">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                <p class="text-muted">Nhập email đã đăng ký để nhận link đặt lại mật khẩu.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Email:</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">Gửi liên kết</button>
                        <a href="{% url 'login' %}" class="btn btn-light border text-dark flex-grow-1">Quay lại đang nhập</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
